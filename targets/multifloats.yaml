name: multifloats

types:
  real: "TYPE(real64x2)"
  complex: "TYPE(cmplx64x2)"

literals:
  mode: constructor
  kind_suffix: null
  real_constructor: real64x2
  complex_constructor: cmplx64x2

intrinsics:
  mode: wrap_constructor

prefixes:
  R: M
  C: W
  I: I
  L: L
  S: S

module:
  name: multifloats
  type_names: [real64x2, cmplx64x2]
  constant_names:
    - dd_zero
    - dd_one
    - dd_two
    - dd_half
    - dd_eight
    - dd_safmin
    - dd_safmax
    - dd_tsml
    - dd_tbig
    - dd_ssml
    - dd_sbig
    - dd_rtmin
    - dd_rtmax
    - dd_to_double
    - dd_real
  generic_names:
    - abs
    - sqrt
    - sin
    - cos
    - tan
    - exp
    - log
    - log10
    - atan
    - asin
    - acos
    - aint
    - anint
    - sinh
    - cosh
    - tanh
    - asinh
    - acosh
    - atanh
    - erf
    - erfc
    - erfc_scaled
    - gamma
    - log_gamma
    - bessel_j0
    - bessel_j1
    - bessel_y0
    - bessel_y1
    - bessel_jn
    - bessel_yn
    - fraction
    - rrspacing
    - spacing
    - epsilon
    - huge
    - tiny
    - aimag
    - conjg
    - sign
    - mod
    - atan2
    - dim
    - modulo
    - hypot
    - nearest
    - min
    - max
    - maxval
    - minval
    - maxloc
    - minloc
    - sum
    - product
    - dot_product
    - norm2
    - findloc
    - matmul
    - digits
    - maxexponent
    - minexponent
    - radix
    - precision
    - range
    - exponent
    - dble
    - int
    - nint
    - real
    - cmplx
    - ceiling
    - floor
    - scale
    - set_exponent
    - storage_size
    - random_number
  operator_generics:
    - "operator(+)"
    - "operator(-)"
    - "operator(*)"
    - "operator(/)"
    - "operator(**)"
    - "operator(==)"
    - "operator(/=)"
    - "operator(<)"
    - "operator(>)"
    - "operator(<=)"
    - "operator(>=)"
    - "assignment(=)"

known_constants:
  ZERO: DD_ZERO
  ONE: DD_ONE
  TWO: DD_TWO
  HALF: DD_HALF
  EIGHT: DD_EIGHT

la_constants_map:
  zero: DD_ZERO
  half: DD_HALF
  one: DD_ONE
  two: DD_TWO
  eight: DD_EIGHT
  safmin: DD_SAFMIN
  safmax: DD_SAFMAX
  tsml: DD_TSML
  tbig: DD_TBIG
  ssml: DD_SSML
  sbig: DD_SBIG

la_constants_suffix: _MF

c_interop:
  # Upstream multifloats v0.4.0 C names (no _t suffix; complex POD with
  # .re/.im members of float64x2). The C++ bridge re-exports these as
  # operator-rich aliases of multifloats::float64x2 / complex64x2.
  real_type: float64x2
  complex_type: complex64x2
  c_real_type: float64x2
  mpi_real: MPI_FLOAT64X2
  mpi_complex: MPI_COMPLEX128X2
  mpi_sum_real: MPI_DD_SUM
  mpi_sum_complex: MPI_ZZ_SUM
  needs_mpi_check: false
  header_mode: include
  header: multifloats_bridge.h
