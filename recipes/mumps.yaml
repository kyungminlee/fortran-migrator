library: mumps
language: fortran
source_dir: external/MUMPS_5.8.2/src
extensions: [.F]

symbols:
  method: scan_source

prefix:
  style: direct

depends:
  - blas.yaml
  - lapack.yaml
  - scalapack.yaml

# Un-prefixed shared files: linked into all four arithmetic builds, they
# cannot depend on working precision and need no type promotion. They are
# copied through unchanged. The list is derived mechanically by
# `scripts/mumps_sweep_keep_kind.py --verbose`; regenerate after any
# upstream bump and paste the "shared files for copy_files" block here.
copy_files:
  - ANA_AMDMF
  - ANA_BLK
  - ANA_BLK_M
  - ANA_OMP_M
  - ANA_ORDERINGS
  - ANA_ORDERINGS_WRAPPERS_M
  - ANA_SET_ORDERING
  - BCAST_ERRORS
  - DOUBLE_LINKED_LIST
  - ESTIM_FLOPS
  - FAC_ASM_BUILD_SORT_INDEX_ELT_M
  - FAC_ASM_BUILD_SORT_INDEX_M
  - FAC_DESCBAND_DATA_M
  - FAC_FUTURE_NIV2_MOD
  - FAC_MAPROW_DATA_M
  - FRONT_DATA_MGT_M
  - LR_COMMON
  - LR_STATS
  - MUMPS_COMM_BUFFER_COMMON
  - MUMPS_INTR_TYPES_COMMON
  - MUMPS_L0_OMP_M
  - MUMPS_LOAD
  - MUMPS_MEMORY_MOD
  - MUMPS_MPITOOMP_M
  - MUMPS_OOC_COMMON
  - MUMPS_PIVNUL_MOD
  - MUMPS_PRINT_DEFINED
  - MUMPS_STATIC_MAPPING
  - MUMPS_TYPE2_BLOCKING
  - MUMPS_VERSION
  - OMP_TPS_COMMON_M
  - SOL_COMMON
  - SOL_DS_COMMON_M
  - SOL_OMP_COMMON_M
  - TOOLS_COMMON
  - TOOLS_COMMON_M

# Per-line keep-kind manifest for DOUBLE PRECISION declarations in
# paired s*/d* and c*/z* files that must not be promoted. Generated by
# `scripts/mumps_sweep_keep_kind.py`. See recipes/README.md for rationale.
keep_kind_manifest: mumps/keep-kind.manifest
