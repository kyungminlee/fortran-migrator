library: mumps
language: fortran
source_dir: external/MUMPS_5.8.2/src
extensions: [.F, .h]

# Per-arithmetic headers (*mumps_struc.h) live in a parallel include/
# directory, not src/. They are Fortran content (DOUBLE PRECISION / TYPE
# blocks) that must be migrated so ``INCLUDE 'dmumps_struc.h'`` in
# dmumps_struc_def.F resolves against the renamed output header
# (qmumps_struc.h for kind16).
extra_fortran_dirs:
  - external/MUMPS_5.8.2/include

symbols:
  method: scan_source

prefix:
  style: direct

depends:
  - blas.yaml
  - lapack.yaml
  - scalapack.yaml

# C headers — pulled in by extensions:[.h] but handled separately by
# the (not-yet-written) C recipe. Skip here so the Fortran migrator
# doesn't mangle their C syntax.
skip_files:
  # include/ — arithmetic-prefixed C API headers
  - CMUMPS_C
  - DMUMPS_C
  - SMUMPS_C
  - ZMUMPS_C
  # include/ — shared C API headers
  - MUMPS_COMPAT
  - MUMPS_C_TYPES
  # src/ — C implementation headers
  - CMUMPS_GPU
  - DMUMPS_GPU
  - SMUMPS_GPU
  - ZMUMPS_GPU
  - MUMPS_ADDR
  - MUMPS_COMMON
  - MUMPS_CONFIG_FILE_C
  - MUMPS_FLYTES
  - MUMPS_IO
  - MUMPS_IO_BASIC
  - MUMPS_IO_ERR
  - MUMPS_IO_THREAD
  - MUMPS_METIS
  - MUMPS_METIS64
  - MUMPS_METIS_INT
  - MUMPS_PORD
  - MUMPS_REGISTER_THREAD
  - MUMPS_SAVE_RESTORE_C
  - MUMPS_SCOTCH
  - MUMPS_SCOTCH64
  - MUMPS_SCOTCH_INT
  - MUMPS_THREAD_AFFINITY

# Shared files to copy verbatim. Most shared modules aggregate
# working-precision data (mem/cost/flop/load counters) that cross into
# migrated arithmetic-specific callers, so they must be migrated — not
# copied — or callers hit "passed REAL(16) to REAL(8)" argument
# mismatches. The list below is only the files that truly carry no
# working precision or interface with external fixed-width APIs
# (MPI_WTIME, Scotch) that must stay at REAL(8).
copy_files:
  # Shared headers INCLUDEd by MUMPS Fortran sources. Text-only, no FP.
  - MUMPS_HEADERS              # src/mumps_headers.h
  - MUMPS_SAVE_RESTORE_MODES   # src/mumps_save_restore_modes.h
  - MUMPS_TAGS                 # src/mumps_tags.h

  - DOUBLE_LINKED_LIST  # integer-only generic data structure
  - BCAST_ERRORS        # integer status broadcast
  - MUMPS_VERSION       # string constants only
  - TOOLS_COMMON        # MPI_WTIME / MUMPS_SECDEB timing primitives
  - TOOLS_COMMON_M      # module wrapping tools_common
  - ANA_ORDERINGS              # Scotch / Metis interface (REAL(8) buffers)
  - ANA_ORDERINGS_WRAPPERS_M   # Scotch / Metis wrappers

# Per-line keep-kind manifest for DOUBLE PRECISION declarations in
# paired s*/d* and c*/z* files that must not be promoted. Generated by
# `scripts/mumps_sweep_keep_kind.py`. See recipes/README.md for rationale.
keep_kind_manifest: mumps/keep-kind.manifest
