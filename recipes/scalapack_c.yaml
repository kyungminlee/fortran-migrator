library: scalapack_c
language: c
source_dir: external/scalapack-2.2.3/SRC
extensions: [.c, .h]

symbols:
  method: scan_source

depends:
  - lapack.yaml
  - blacs.yaml
  - pblas.yaml
  - scalapack.yaml

extra_symbol_dirs:
  - external/scalapack-2.2.3/TOOLS
  - external/scalapack-2.2.3/SRC
  - external/scalapack-2.2.3/REDIST/SRC   # pdgemr2d_, pztrmr2d_, pigemraux_, etc.

# REDIST/SRC houses the C implementations of the matrix-redistribution
# entry points (pdgemr2d, pztrmr2d, pigemr2d, …). TOOLS/ ships two
# precision-independent C helpers (SL_gridreshape.c, reshape.c) called
# from pdsyev's grid setup. Both directories are pulled in as extra C
# sources so the cloned pq*/px* and untouched sl_gridreshape_ entry
# points all live in libscalapack_c.
extra_c_dirs:
  - external/scalapack-2.2.3/REDIST/SRC
  - external/scalapack-2.2.3/TOOLS

prefix:
  style: scalapack   # P + S/D/C/Z

# These routines already exist in PBLAS/SRC (modern ANSI C) and were
# migrated as part of the PBLAS pipeline. The SRC/ copies are older
# K&R-style duplicates — skip them to avoid symbol conflicts at link time.
skip_files:
  - PZAXPY
  - PZDOTC
  - PZDOTU

# ScaLAPACK SRC uses complex16 (from pblas.h) for double-complex.
# Map it to complex128x2_t for multifloats. Also rename the REDIST
# helper-function aliases (dgescanD0, dgedispmat, dgesetmemory,
# dgefreememory, dgescan_intervals; matching c-prefix family for
# pcgemr.c) to the per-target precision letter — these come from
# ``#define`` macros inside the source so the symbol scanner never
# adds them to the rename map automatically.
c_type_aliases:
  - from: [complex16]
    to: '{COMPLEX_TYPE}'
  # REDIST helper-function aliases come from in-file ``#define X dgeY``
  # macros, so the symbol scanner doesn't add them to the rename map.
  # Map them per precision family explicitly — d/z are real/complex
  # at kind16 (→ q/x), at multifloats (→ dd/zz), etc.
  - from: [dgescanD0]
    to: '{RP}gescanD0'
  - from: [zgescanD0]
    to: '{CP}gescanD0'
  - from: [dgedispmat]
    to: '{RP}gedispmat'
  - from: [zgedispmat]
    to: '{CP}gedispmat'
  - from: [dgesetmemory]
    to: '{RP}gesetmemory'
  - from: [zgesetmemory]
    to: '{CP}gesetmemory'
  - from: [dgefreememory]
    to: '{RP}gefreememory'
  - from: [zgefreememory]
    to: '{CP}gefreememory'
  - from: [dgescan_intervals]
    to: '{RP}gescan_intervals'
  - from: [zgescan_intervals]
    to: '{CP}gescan_intervals'
  - from: [Cdgelacpy]
    to: 'C{RP}gelacpy'
  - from: [Czgelacpy]
    to: 'C{CP}gelacpy'

copy_all_originals: true

header_patches:
  - file: pblas.h
    when: multifloats
    after: 'typedef struct { double re, im; } complex16;'
    insert: |
      #include "multifloats_bridge.h"
  # REDIST/SRC sources include only ``redist.h`` and ``<stddef.h>`` —
  # neither carries the ``QREAL``/``EREAL``/``float64x2_t`` typedefs the
  # migrated bodies reference. Including pblas.h would conflict with
  # the local ``typedef struct { float r, i; } complex;`` (different
  # field names from pblas.h's ``re, im``), so just inject the primitive
  # real-precision typedef.
  - file: redist.h
    when: kind
    before: '#ifdef T3D'
    insert: |
      typedef {C_REAL_TYPE} {REAL_TYPE};
  - file: redist.h
    when: multifloats
    before: '#ifdef T3D'
    insert: |
      #include "multifloats_bridge.h"

overrides:
  multifloats:
    src_dir: scalapack/mfc_overrides
    files:
      - pddlaiect.c
