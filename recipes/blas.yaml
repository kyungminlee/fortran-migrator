library: blas
language: fortran
source_dir: external/lapack-3.12.1/BLAS/SRC
extensions: [.f, .f90]

symbols:
  method: scan_source

prefix:
  style: direct

# Cross-precision routines — these mix single and double precision
# (e.g., double result from single inputs). No single-kind target.
skip_files:
  - DSDOT    # double result from single·single dot product
  - SDSDOT   # single result with double accumulator
