library: blas
language: fortran
source_dir: external/lapack-3.12.1/BLAS/SRC
extensions: [.f, .f90]

symbols:
  method: scan_source

prefix:
  style: direct

# Files dropped entirely from the migrated archive:
#  - DSDOT / SDSDOT — cross-precision routines (single+double mixed).
#    No single-kind target; not migratable to extended precision.
#  - LSAME / XERBLA / XERBLA_ARRAY — precision-independent helpers.
#    They live in the standard-precision archive ``blas`` (built from
#    the same Netlib sources without -freal-8-real-16) which the
#    migrated archive PUBLIC-links — no need to ship a duplicate copy
#    in the extended-precision archive.
skip_files:
  - DSDOT
  - SDSDOT
  - LSAME
  - XERBLA
  - XERBLA_ARRAY
