library: lapack
language: fortran
source_dir: external/lapack-3.12.1/SRC
extensions: [.f, .f90, .F90]

symbols:
  method: scan_source

depends:
  - blas.yaml

# INSTALL directory contains slamch/dlamch, sroundup_lwork, etc.
extra_symbol_dirs:
  - external/lapack-3.12.1/INSTALL

# dlamch / droundup_lwork are called from dozens of LAPACK SRC routines
# (dlascl, dsyev, dgesvd, dgetrf2, …). The files themselves live in
# INSTALL/ alongside test programs, timer-routine variants, and an
# already-in-BLAS copy of lsame.f — so we pull just these two into the
# migrated library instead of sweeping the whole directory.
extra_migrate_files:
  - external/lapack-3.12.1/INSTALL/dlamch.f
  - external/lapack-3.12.1/INSTALL/droundup_lwork.f

prefix:
  style: direct

# Mixed-precision / iterative-refinement / cross-precision conversion
skip_files:
  - ZCGESV
  - DSGESV
  - ZCPOSV
  - DSPOSV
  - ZCGELS
  - DSGELS
  # Cross-precision type conversion routines
  - DLAG2S
  - SLAG2D
  - CLAG2Z
  - ZLAG2C
  - DLAT2S
  - ZLAT2C

# Multi-precision utility modules — copy unchanged
copy_files:
  - LA_CONSTANTS
  - LA_CONSTANTS_EP
  - LA_CONSTANTS_MF
  - LA_XISNAN
  - LA_XISNAN_EP
  - LA_XISNAN_MF

# Hand-patched overrides. The multifloats T-prefix renames DSCAL → TSCAL,
# which collides with a local variable also named TSCAL in the source
# of dlatbs.f / dlatps.f / dlatrs.f. The overrides rename the local
# variable to TSCFAC; the EXTERNAL/CALL sites keep TSCAL (the renamed
# routine). This is the only LAPACK-internal local-name clash with the
# T-prefixed BLAS namespace (verified by intersecting BLAS T-routines
# with all T<UPPER>-prefixed local variable declarations in LAPACK).
overrides:
  multifloats:
    src_dir: lapack/mf_overrides
    files:
      - tlatbs.f
      - tlatps.f
      - tlatrs.f
      - vlatbs.f
      - vlatps.f
      - vlatrs.f
      # iparam2stage workspace dispatcher patched to recognize the
      # multifloats real/complex prefixes (T/V) so 2-stage routines
      # get a non-bogus LWORK back. Without this, the migrated
      # name `'TSYTRD_2STAGE'` falls through iparam2stage's S/D/C/Z
      # gate and IPARAM2STAGE returns -1 → LWMIN < actual workspace
      # → heap corruption inside qsyev_2stage / vheev_2stage.
      - iparam2stage.F
  # Same iparam2stage patch is needed for kind16 (prefixes Q/X) and
  # kind10 (E/Y). Reuse the file from lapack/mf_overrides since the
  # patched logic recognizes all six migrator prefixes — the file is
  # not target-specific, only the wiring is.
  kind16:
    src_dir: lapack/mf_overrides
    files:
      - iparam2stage.F
  kind10:
    src_dir: lapack/mf_overrides
    files:
      - iparam2stage.F
