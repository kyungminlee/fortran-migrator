library: scalapack
language: fortran
source_dir: external/scalapack-2.2.3/SRC
extensions: [.f, .f90]

symbols:
  method: scan_source

depends:
  - lapack.yaml   # transitively includes BLAS
  - blacs.yaml    # BLACS comm routines (SGEBR2D/DGEBR2D, etc.)
  - pblas.yaml    # ScaLAPACK routines call PBLAS entry points directly

# Additional source dirs to scan for symbols (not migrated, just for renaming)
# Scans both Fortran and C files, plus subdirectories.
extra_symbol_dirs:
  - external/scalapack-2.2.3/TOOLS
  - external/scalapack-2.2.3/PBLAS/SRC
  - external/scalapack-2.2.3/SRC        # re-scan for C symbols (slamov, etc.)
  - external/scalapack-2.2.3/REDIST/SRC # pigemr2d, etc.

# TOOLS/ houses ScaLAPACK's descriptor/grid/communication helpers —
# numroc_, iceil_, ilcm_, descinit_, pchk1mat_, the pd*/pz* element
# accessors, pdtreecomb_ (with its embedded DCOMBSSQ), SL_init
# (sl_gridreshape_), the {s,c,d,z}{matadd,latcpy} families, and the
# integer-family piXXX helpers. Every symbol a ScaLAPACK routine calls
# into from TOOLS is sourced from here. The zzdotc.f/zzdotu.f pair is
# owned by PTZBLAS (migrated via ptzblas.yaml) and is deliberately
# excluded so the final link isn't ambushed by duplicate xxdotc_/
# xxdotu_ symbols across two archives.
extra_migrate_files:
  # PJLAENV_EP — extended-precision-aware variant of PJLAENV. Lives
  # under recipes/scalapack/extras/ rather than external/ because it
  # is a new symbol introduced by the migrator (not a swap of an
  # upstream file). The 10 callers that pass their own migrated name
  # to PJLAENV are rerouted via source_overrides below to call
  # PJLAENV_EP instead, sidestepping upstream PJLAENV's strict
  # S/D/C/Z precision-letter gate.
  - recipes/scalapack/extras/pjlaenv_ep.f
  # PILAENVX_EP is the QR/Hessenberg sibling of PJLAENV_EP — same
  # S/D/C/Z gate bug at external/scalapack-2.2.3/SRC/pilaenvx.f:212-215
  # uninitialises the result for migrated names like 'PELAQR0' /
  # 'PELAQR5' / 'PESYTRD' that the QR eigensolver path passes in.
  - recipes/scalapack/extras/pilaenvx_ep.f
