prefix:
  style: scalapack  # P + S/D/C/Z

skip_files:
  # PJLAENV / PILAENVX are replaced in the migrated archive by their
  # *_EP variants (see extras/p{jl,il}aenv*_ep.f and the extra_renames
  # entries below). Skip the upstream files so they don't get migrated
  # to duplicate symbols.
  - PJLAENV
  - PILAENVX

# Override D/Z-first canonical selection for pairs where the Z half
# carries an upstream bug that the C half does not. PZUNGQL / PZUNML2
# call PB_TOPGET in their restore step where they should call
# PB_TOPSET (copy-paste bug in ScaLAPACK 2.2.3 — the C counterparts
# have the correct PB_TOPSET). Pinning PCUNGQL / PCUNML2 as canonical
# makes the migrated output inherit the correct restore logic.
prefer_source:
  - PCUNGQL   # fixes restore bug in pzungql.f:292-293
  - PCUNML2   # fixes restore bug in pzunml2.f:394-395
  # Pin the D/Z half as canonical so the source_overrides on
  # pdlanhs.f / pzlanhs.f win convergence (the canonical-rank
  # picker doesn't recognize ScaLAPACK's pd*/pz* prefix shape, so
  # without an explicit pin it sorts pclanhs.f alphabetically first
  # and that un-fixed copy becomes canonical). The corresponding
  # source_overrides entries supply the bug-fixed PD/PZ bodies.
  - PDLANHS
  - PZLANHS
  # Same pin reason as PDLANHS/PZLANHS: the source_overrides for
  # PDGEEQU/PZGEEQU only patch the D/Z half. Without an explicit
  # prefer_source pin, the canonical-rank picker sorts pcgeequ.f
  # alphabetically first and the un-fixed copy becomes canonical.
  - PDGEEQU
  - PZGEEQU
  # Same pin reason: source_overrides for PDPOSVX/PZPOSVX patch the
  # LWMIN-too-small upstream bug; pin the D/Z half so the canonical-
  # rank picker doesn't choose an alphabetically-earlier S/C copy.
  - PDPOSVX
  - PZPOSVX
  # Same pin reason: source_overrides for PDLARZB/PZLARZB patch the
  # PBDTRAN/PBZTRAN LDC mismatch (M+ICOFFV vs L+ICOFFV); pin the D/Z
  # half so the canonical-rank picker doesn't pick the un-fixed
  # alphabetically-earlier S/C copy.
  - PDLARZB
  - PZLARZB
  # Same pin reason: source_overrides for PDORMRZ/PZUNMRZ patch the
  # post-loop-condition copy-paste bug (post-loop should be the
  # complement of pre-loop, not a duplicate). Pin the D/Z half.
  - PDORMRZ
  - PZUNMRZ
  # Same pin reason: source_overrides for PDLARZ/PZLARZ patch the
  # MPV/NQV undersizing and the DAXPY stride bug. Pin the D/Z half.
  - PDLARZ
  - PZLARZ
  # Same pin reason: source_overrides for PZLARZC patch the same
  # buffer/stride bugs in the Q**H variant. Pin to dominate PCLARZC.
  - PZLARZC

# Mirror the scalapack_c.yaml rename for pdlaiectb_/pdlaiectl_: the
# Fortran callers PDSTEBZ / PDSYEVX / PDSYGVX / PZHEEVX / PZHEGVX
# directly reference these C helpers, so the migrated callers (pqstebz
# etc.) need to call into the extended-precision clones rather than
# the standard-precision originals (which take double*, not QREAL*).
extra_renames:
  PDLAIECTB: P{RPU}LAIECTB
  PDLAIECTL: P{RPU}LAIECTL
  # Reroute every PJLAENV call site to PJLAENV_EP, the extended-
  # precision-aware variant shipped from recipes/scalapack/extras/.
  # Upstream PJLAENV's strict S/D/C/Z gate returns uninitialised for
  # migrated names like 'PESYTTRD' / 'PXHETTRD'. PJLAENV is added to
  # skip_files below so the upstream pjlaenv.f isn't migrated
  # (otherwise its FUNCTION PJLAENV declaration would be renamed to
  # FUNCTION PJLAENV_EP and clash with our extras file).
  PJLAENV: PJLAENV_EP
  PILAENVX: PILAENVX_EP

# Override upstream ScaLAPACK 2.2.3 sources whose contents we patch
# locally (without editing external/). The replacement file is in
# upstream shape (DOUBLE PRECISION names, dgemm-style call sites) and
# goes through the normal migration pipeline, so a single override
# produces correctly-renamed/promoted output for every target.
source_overrides:
  pdlanhs.f: scalapack/source_overrides/pdlanhs.f
  pzlanhs.f: scalapack/source_overrides/pzlanhs.f
  # PDGEEQU / PZGEEQU column-scale RCMAX/RCMIN/INFO reductions used the
  # 'Columnwise' axis where 'Rowwise' is needed; under multi-MYCOL grids
  # COLCND was computed from each grid column's local block instead of
  # the global. Extends the override pattern; see the body comment.
  pdgeequ.f: scalapack/source_overrides/pdgeequ.f
  pzgeequ.f: scalapack/source_overrides/pzgeequ.f
  # PDPOSVX / PZPOSVX upstream LWMIN = 3*DESCA(LLD_) is insufficient
  # for the internal PDPOCON/PZPOCON + PDPORFS/PZPORFS workspace
  # contracts (see commented prologue at line 311 of either file).
  # The internal PDPOCON / PZPOCON call then aborts with INFO=-10
  # ("LWORK too small") on every grid above the smallest. The override
  # restores the documented MAX(PDPOCON,PDPORFS) formula.
  pdposvx.f: scalapack/source_overrides/pdposvx.f
  pzposvx.f: scalapack/source_overrides/pzposvx.f
  # PDLARZB / PZLARZB SIDE='L' branch passed M+ICOFFV (the C-row count)
  # as PBDTRAN/PBZTRAN's N argument while sizing the destination buffer
  # WORK( IPV ) / LV from MPC20 = local rows of L. Whenever M > L
  # (typical: M = K+L from PDORMRZ/PZUNMRZ), PBDTRAN's LDC contract
  # `LDC >= NUMROC( N_arg, NBV, MYROW, ICROW2, NPROW )` fails — the
  # transpose silently no-ops via PXERBLA(INFO=11) and the trailing
  # GEMM multiplies uninitialised data into C, surfacing as a ~1.3x
  # numerical-corruption error in PDORMRZ/PZUNMRZ. The override changes
  # M+ICOFFV to L+ICOFFV in the PBDTRAN call (and matching MQV0
  # computation), which matches the only-K×L-meaningful row-stored RZ
  # convention.
  pdlarzb.f: scalapack/source_overrides/pdlarzb.f
  pzlarzb.f: scalapack/source_overrides/pzlarzb.f
  # PDORMRZ / PZUNMRZ post-loop condition is a copy-paste of the pre-
  # loop condition (line 458 vs 416 in pdormrz.f, line 459 vs 417 in
  # pzunmrz.f). For SIDE/TRANS combinations (LEFT,NOTRAN) and
  # (RIGHT,TRANS), the leftover-block PDORMR3/PZUNMR3 call never fires
  # — neither pre nor post — leaving the trailing partial-MB block of
  # reflectors unapplied. The mainline DO loop also misses the missing
  # block due to its asymmetric I1/I2 bounds. The override fixes the
  # post-loop condition to be the complement of the pre-loop, matching
  # the correct structure in PDORMRQ/PZUNMRQ.
  pdormrz.f: scalapack/source_overrides/pdormrz.f
  pzunmrz.f: scalapack/source_overrides/pzunmrz.f
  # PDLARZ / PZLARZ carry two upstream bugs.
  # (a) Buffer undersizing: MPV (SIDE='L') / NQV (SIDE='R') were
  #     computed from V's distribution (IVROW/IROFFV/MB_V or
  #     IVCOL/ICOFFV/NB_V), but the row-V/col-V P?TRNV calls transpose
  #     V into sub(C2)'s procrow/proccol and write sub(C2)'s local
  #     count. When PDORMR3/PZUNMR3 iterates IV/JV across blocks the
  #     P?LARZ alignment restriction is violated and the receiver is
  #     undersized by 1-3 elements — observed as glibc
  #     'corrupted size vs. prev_size' aborts on NPROW>1 grids with
  #     non-uniform A row distribution. Override redefines MPV/NQV
  #     from sub(C2)'s distribution.
  # (b) DAXPY stride: six DAXPY/ZAXPY calls into WORK/WORK(IPW) used
  #     INCY = MAX(1,NQC2) (a leading dimension) where WORK is a
  #     contiguous vector — correct stride is 1, matching LAPACK's
  #     DLARZ/ZLARZ. With NQC2>1 the previous stride could skip past
  #     the buffer.
  pdlarz.f: scalapack/source_overrides/pdlarz.f
  pzlarz.f: scalapack/source_overrides/pzlarz.f
  # PZLARZC carries the same MPV/NQV undersizing and ZAXPY-stride bugs
  # as PZLARZ (byte-identical formulas; PZLARZC is just the Q**H
  # variant called from PZUNMR3 when TRANS='C'). Without this fix
  # PZUNMRZ SIDE='L' for the conjugate-transpose path produces
  # numerically corrupted output (~factor of 2-2.5 off). PCLARZC has
  # the same bug; the migrator does not need a separate pclarzc
  # override because the prefer_source pin below routes through
  # PZLARZC.
  pzlarzc.f: scalapack/source_overrides/pzlarzc.f

# local_renames: (reserved for non-precision local-variable drift like
# CONJTOPH→TTOPH that isn't an S↔D / C↔Z prefix swap. Precision-prefix
# drift is now auto-filtered at diff time — see _filter_precision_drift.)

# No hand-patched Fortran overrides needed. With multifloats prefixes
# M/W, the V→VCOPY collisions in pXlahqr/pXlaqr1 and the T→TSCAL
# collision in pvlattrs no longer occur — the renamed BLAS routines
# (WCOPY, MSCAL) don't shadow any local in the affected files.

