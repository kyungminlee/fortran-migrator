library: xblas
language: c
source_dir: external/xblas-1.0.248/src
extensions: [.c, .h]

symbols:
  method: scan_source

# XBLAS internal residual refinement is built on top of regular BLAS:
# the *_x routines call DDOT/DGEMV/etc. for the working-precision pass
# before the extra-precision correction step. Listing blas as a
# dependency pulls BLAS symbols into the rename map so calls in
# migrated XBLAS bodies retarget correctly (e.g. ddot -> qdot under
# kind16).
depends:
  - blas.yaml

# XBLAS source is organized one subdirectory per routine family
# (gemv/, gbmv/, ge_sum_mv/, ...). Top-level src/ holds only the
# precision-independent headers (blas_extended.h, blas_enum.h, ...).
# The C migrator's directory walker is non-recursive, so each
# routine subdir must be listed explicitly here. ``common/`` carries
# precision-independent helpers (BLAS_error, blas_malloc) and
# ``BLAS_fpinfo_x`` which is a uniform-precision _x routine.
extra_c_dirs:
  - external/xblas-1.0.248/src/axpby
  - external/xblas-1.0.248/src/common
  - external/xblas-1.0.248/src/dot
  - external/xblas-1.0.248/src/gbmv
  - external/xblas-1.0.248/src/gbmv2
  - external/xblas-1.0.248/src/gemm
  - external/xblas-1.0.248/src/gemv
  - external/xblas-1.0.248/src/gemv2
  - external/xblas-1.0.248/src/ge_sum_mv
  - external/xblas-1.0.248/src/hbmv
  - external/xblas-1.0.248/src/hemm
  - external/xblas-1.0.248/src/hemv
  - external/xblas-1.0.248/src/hemv2
  - external/xblas-1.0.248/src/hpmv
  - external/xblas-1.0.248/src/sbmv
  - external/xblas-1.0.248/src/spmv
  - external/xblas-1.0.248/src/sum
  - external/xblas-1.0.248/src/symm
  - external/xblas-1.0.248/src/symv
  - external/xblas-1.0.248/src/symv2
  - external/xblas-1.0.248/src/tbsv
  - external/xblas-1.0.248/src/tpmv
  - external/xblas-1.0.248/src/trmv
  - external/xblas-1.0.248/src/trsv
  - external/xblas-1.0.248/src/waxpby

prefix:
  style: direct

# The C migrator's broad ``double``/``float`` → ``{REAL_TYPE}`` (e.g.
# QREAL for kind16) substitution rewrites function bodies and
# prototypes inside the migrated archive, but the typedef itself
# isn't shipped by XBLAS. Inject it into the public umbrella header
# so consumers and the migrated bodies all see the type. For
# multifloats, pull in the bridge header that declares float64x2 /
# complex64x2 as POD aliases of multifloats's overload-rich C++ types.
header_patches:
  # blas_enum.h is the most-included header in XBLAS — pulled in by
  # blas_extended.h (the umbrella header for the routines) AND by
  # every *-f2c.c bridge directly. Injecting the typedefs here makes
  # them available in every translation unit.
  - file: blas_enum.h
    when: kind
    after: '#define BLAS_ENUM_H'
    insert: |
      typedef {C_REAL_TYPE} {REAL_TYPE};
      typedef struct { {REAL_TYPE} re, im; } {COMPLEX_TYPE};
  - file: blas_enum.h
    when: multifloats
    after: '#define BLAS_ENUM_H'
    insert: |
      #include "multifloats_bridge.h"
  # multifloats compiles XBLAS C sources as C++ (so multifloats's
  # operator-overload-rich float64x2 type does what's needed in
  # element-wise math). The two prototype headers declare functions
  # at file scope without extern "C", so the C++ compiler gives them
  # C++ linkage; the function definitions in *.c then re-open
  # extern "C" inside the translation unit, producing
  # "conflicting declaration … with C linkage" errors. Wrap each
  # proto.h body in an extern "C" block under multifloats.
  - file: blas_extended_proto.h
    when: multifloats
    after: '#define BLAS_EXTENDED_PROTO_H'
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif
  - file: blas_extended_proto.h
    when: multifloats
    before: '#endif /* BLAS_EXTENDED_PROTO_H */'
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  # blas_dense_proto.h's trailing include-guard `#endif` is on its own
  # line followed by an indented comment — order the closing-brace
  # patch BEFORE the opening one so `before: '#endif'` still matches
  # the original include guard's `#endif` (the opening patch's own
  # `#endif` doesn't exist yet at this point).
  - file: blas_dense_proto.h
    when: multifloats
    before: '#endif'
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  - file: blas_dense_proto.h
    when: multifloats
    after: '#define BLAS_DENSE_PROTO_H'
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif
  # blas_malloc.h declares blas_malloc/blas_realloc/blas_free in the
  # #else branch of an NO_BLASMALLOC switch. Same C-vs-C++ linkage
  # mismatch under multifloats. Apply the closing patch first so the
  # `before: '#endif'` anchor still points to the original close-of-
  # #else (the opening patch's own `#endif` doesn't exist yet).
  - file: blas_malloc.h
    when: multifloats
    before: '#endif'
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  - file: blas_malloc.h
    when: multifloats
    after: '#include <stddef.h>'
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif

# Mixed-input-precision variants (BLAS_<P><routine>_<P1>_<P2>[_x].c)
# have no S/C ↔ D/Z partner in the source tree — the prefix
# classifier cannot pair them and would emit them un-renamed under
# the migrated stem, conflicting with the standard archive at link
# time. They are also unreachable from LAPACK (the *la_*_extended.f
# callers only invoke uniform-precision entry points), so drop them
# entirely. Regenerate with:
#   python recipes/xblas/gen_skip_list.py
# and paste the output here.
