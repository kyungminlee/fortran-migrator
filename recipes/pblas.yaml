library: pblas
language: c
source_dir: external/scalapack-2.2.3/PBLAS/SRC
extensions: [.c, .h]

symbols:
  method: scan_source

depends:
  - blas.yaml    # BLAS kernels called from PBLAS Fortran kernels
  - blacs.yaml   # BLACS comm routines called from PBLAS

# Fortran kernels and C helpers that live alongside PBLAS/SRC.
# Scanned so every cross-directory call gets a consistent rename
# (e.g. PBLAS entry pdgemm_ -> PTZBLAS kernel catrmv_ -> BLAS dgemm_).
extra_symbol_dirs:
  - external/scalapack-2.2.3/PBLAS/SRC/PBBLAS    # Fortran PB-BLAS kernels
  - external/scalapack-2.2.3/PBLAS/SRC/PTZBLAS   # Fortran trapezoidal BLAS kernels
  - external/scalapack-2.2.3/PBLAS/SRC/PTOOLS    # C PBLAS helpers (PB_C*)

# C helper directory whose .c sources are flat-copied (and cloned for
# precision-family members) into output_dir alongside SRC/. Without
# this the migrated entry points have nothing to call -- the original
# PB_Cdtypeset symbol still exists but PB_Cddtypeset would not.
extra_c_dirs:
  - external/scalapack-2.2.3/PBLAS/SRC/PTOOLS

prefix:
  style: scalapack   # P + S/D/C/Z entry points

# Extra C return types used by PBLAS helper routines that the scanner's
# built-in return-type set does not cover. Each entry is a regex fragment
# matched before the function name. Needed so PB_C{s,d,c,z}typeset get
# into the symbol table and participate in precision-family renaming.
c_return_types:
  - 'PBTYP_T\s*\*'

# PBLAS represents complex scalars as a 2-element array of the underlying
# real type (``typedef float cmplx[2]`` in single precision, ``typedef
# double cmplx16[2]`` in double). Sources index these with
# ``work[i][REAL_PART]`` / ``[IMAG_PART]``, so the migrated type must
# keep the array layout — the generic ``QCOMPLEX`` struct cannot stand
# in. Add a kind-specific array typedef (``cmplxQ`` for KIND=16,
# ``cmplxE`` for KIND=10, ``cmplxDD`` for multifloats) via
# header_patches and point both originals at it with c_type_aliases.
c_type_aliases:
  - from: [cmplx, cmplx16]
    to: 'cmplx{RPU}'

header_patches:
  # KIND targets: introduce primitive QREAL/EREAL typedef plus the
  # cmplxQ/cmplxE array form.
  - file: pblas.h
    when: kind
    after: 'typedef    double              cmplx16[2];'
    insert: |
      typedef    {C_REAL_TYPE}          cmplx{RPU}[2];
      typedef    {C_REAL_TYPE}          {REAL_TYPE};
  # Multifloats target: float64x2_t comes from libmfc's multifloats_c.h.
  # Just include the header and add the cmplxDD array typedef.
  - file: pblas.h
    when: multifloats
    after: 'typedef    double              cmplx16[2];'
    insert: |
      #include "multifloats_c.h"
      typedef    {C_REAL_TYPE}          cmplx{RPU}[2];

# PBLAS/SRC contains 123 precision-specific C entry points (pdgemm_.c,
# pzhemm_.c, pcsscal_.c, pdznrm2_.c, ...) plus one precision-independent
# Fortran file (pilaenv.f). All originals are retained so the resulting
# library still exposes the standard S/D/C/Z names.
copy_all_originals: true

skip_files: []

# Hand-written replacements for the PB_C[dz]typeset typeset functions.
# The migrated-by-regex versions try to assign the macro ZERO (= 0.0)
# directly to a float64x2_t local, which the C type system rejects.
# These overrides use libmfc's struct constructors instead and refer
# to the migrated BLACS / BLAS / PBBLAS / PTZBLAS routine names by
# the renamed dd / zz prefixes.
overrides:
  multifloats:
    src_dir: pblas/mfc_overrides
    files:
      - pb_cddtypeset.c
      - pb_czztypeset.c
      # C++ bridge header providing type aliases and operators.
      # Copied to output_dir so -include pblas_mf_bridge.h resolves.
      - pblas_mf_bridge.h
      # Overlay header (fallback for pure-C compilation path).
      - pblas_mf_overlay.h
