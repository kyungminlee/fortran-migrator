library: pblas
language: c
source_dir: external/scalapack-2.2.3/PBLAS/SRC
extensions: [.c, .h]

symbols:
  method: scan_source

depends:
  - blas.yaml    # BLAS kernels called from PBLAS Fortran kernels
  - blacs.yaml   # BLACS comm routines called from PBLAS

# Fortran kernels and C helpers that live alongside PBLAS/SRC.
# Scanned so every cross-directory call gets a consistent rename
# (e.g. PBLAS entry pdgemm_ -> PTZBLAS kernel catrmv_ -> BLAS dgemm_).
extra_symbol_dirs:
  - external/scalapack-2.2.3/PBLAS/SRC/PBBLAS    # Fortran PB-BLAS kernels
  - external/scalapack-2.2.3/PBLAS/SRC/PTZBLAS   # Fortran trapezoidal BLAS kernels
  - external/scalapack-2.2.3/PBLAS/SRC/PTOOLS    # C PBLAS helpers (PB_C*)

# C helper directory whose .c sources are flat-copied (and cloned for
# precision-family members) into output_dir alongside SRC/. Without
# this the migrated entry points have nothing to call -- the original
# PB_Cdtypeset symbol still exists but PB_Cddtypeset would not.
extra_c_dirs:
  - external/scalapack-2.2.3/PBLAS/SRC/PTOOLS

prefix:
  style: scalapack   # P + S/D/C/Z entry points

# Extra C return types used by PBLAS helper routines that the scanner's
# built-in return-type set does not cover. Each entry is a regex fragment
# matched before the function name. Needed so PB_C{s,d,c,z}typeset get
# into the symbol table and participate in precision-family renaming.
c_return_types:
  - 'PBTYP_T\s*\*'

# PBLAS represents complex scalars as a 2-element array of the underlying
# real type (``typedef float cmplx[2]`` in single precision, ``typedef
# double cmplx16[2]`` in double). Sources index these with
# ``work[i][REAL_PART]`` / ``[IMAG_PART]``, so the migrated type must
# keep the array layout — the generic ``QCOMPLEX`` struct cannot stand
# in. Add a kind-specific array typedef (``cmplxQ`` for KIND=16,
# ``cmplxE`` for KIND=10, ``cmplxDD`` for multifloats) via
# header_patches and point both originals at it with c_type_aliases.
c_type_aliases:
  - from: [cmplx, cmplx16]
    to: 'cmplx{RPU}'

header_patches:
  # Multifloats: PBLAS .c sources are compiled as C++ (for operator
  # overloading on float64x2_t). Without ``extern "C"`` wrappers, the
  # Fortran-callable entry points get C++ name-mangled — the matching
  # declarations in PBpblas.h need to agree. Wrap the entire header
  # body in extern "C" via the at_bof / at_eof patches; c_migrator
  # adds the matching wrap to each ``<name>_.c`` definition body
  # (after the last include, so the bridge templates stay C++).
  - file: PBpblas.h
    when: multifloats
    at_bof: true
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif
  - file: PBpblas.h
    when: multifloats
    at_eof: true
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  # Same wrapping for the other PBLAS headers that declare
  # Fortran-callable / C-callable entry points the migrated PBLAS
  # entry points and the test harness need to resolve at link time:
  # PBblacs.h declares ``Cblacs_*`` and the gather/sum/cast helpers,
  # PBtools.h declares the PTZBLAS Fortran kernels (``qvasum_``,
  # ``ddvasum_``, …), PBblas.h declares the serial BLAS forwards.
  - file: PBblacs.h
    when: multifloats
    at_bof: true
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif
  - file: PBblacs.h
    when: multifloats
    at_eof: true
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  - file: PBtools.h
    when: multifloats
    at_bof: true
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif
  - file: PBtools.h
    when: multifloats
    at_eof: true
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  - file: PBblas.h
    when: multifloats
    at_bof: true
    insert: |
      #ifdef __cplusplus
      extern "C" {
      #endif
  - file: PBblas.h
    when: multifloats
    at_eof: true
    insert: |
      #ifdef __cplusplus
      } /* extern "C" */
      #endif
  # KIND targets: introduce primitive QREAL/EREAL typedef plus the
  # cmplxQ/cmplxE array form.
  - file: pblas.h
    when: kind
    after: 'typedef    double              cmplx16[2];'
    insert: |
      typedef    {C_REAL_TYPE}          cmplx{RPU}[2];
      typedef    {C_REAL_TYPE}          {REAL_TYPE};
  # Multifloats target: float64x2_t comes from the C++ bridge header.
  # cmplxDD is already defined there, so only the include is needed.
  - file: pblas.h
    when: multifloats
    after: 'typedef    double              cmplx16[2];'
    insert: |
      #include "multifloats_bridge.h"
  # Multifloats target: in multifloats mode the C sources are compiled
  # as C++ (for multifloats operator overloading). Clang++ rejects the
  # implicit ``const char[]`` → ``char *`` conversion on string-literal
  # macros like ``NOCONJG`` when they are passed to BLAS-style
  # ``char *`` parameters, and it does not honor ``-fpermissive``. Shadow
  # the originals with C-style-cast versions under ``__cplusplus`` so
  # call sites compile without any source edits.
  - file: PBblas.h
    when: multifloats
    after: '#define    ALLOCATE            "A"'
    insert: |
      #ifdef __cplusplus
      #undef NOTRAN
      #undef NOCONJG
      #undef TRAN
      #undef CONJG
      #undef COTRAN
      #undef ALL
      #undef LOWER
      #undef UPPER
      #undef DIAGONAL
      #undef LEFT
      #undef RIGHT
      #undef UNIT
      #undef NOUNIT
      #undef INIT
      #undef NOINIT
      #undef FORWARD
      #undef BACKWARD
      #undef REUSE
      #undef ALLOCATE
      #define NOTRAN    ((char *)"N")
      #define NOCONJG   ((char *)"N")
      #define TRAN      ((char *)"T")
      #define CONJG     ((char *)"Z")
      #define COTRAN    ((char *)"C")
      #define ALL       ((char *)"A")
      #define LOWER     ((char *)"L")
      #define UPPER     ((char *)"U")
      #define DIAGONAL  ((char *)"D")
      #define LEFT      ((char *)"L")
      #define RIGHT     ((char *)"R")
      #define UNIT      ((char *)"U")
      #define NOUNIT    ((char *)"N")
      #define INIT      ((char *)"I")
      #define NOINIT    ((char *)"N")
      #define FORWARD   ((char *)"F")
      #define BACKWARD  ((char *)"B")
      #define REUSE     ((char *)"R")
      #define ALLOCATE  ((char *)"A")
      #endif
  # Same treatment for PBblacs.h (ROW / COLUMN / BCAST / TOP_*).
  - file: PBblacs.h
    when: multifloats
    after: '#define    TOP_TREE9           "9"'
    insert: |
      #ifdef __cplusplus
      #undef COLUMN
      #undef ROW
      #undef BCAST
      #undef COMBINE
      #undef TOP_GET
      #undef TOP_DEFAULT
      #undef TOP_IRING
      #undef TOP_DRING
      #undef TOP_SRING
      #undef TOP_HYPER
      #undef TOP_FULL
      #undef TOP_MRING
      #undef TOP_TTREE
      #undef TOP_TREE1
      #undef TOP_TREE2
      #undef TOP_TREE3
      #undef TOP_TREE4
      #undef TOP_TREE5
      #undef TOP_TREE6
      #undef TOP_TREE7
      #undef TOP_TREE8
      #undef TOP_TREE9
      #define COLUMN       ((char *)"C")
      #define ROW          ((char *)"R")
      #define BCAST        ((char *)"B")
      #define COMBINE      ((char *)"C")
      #define TOP_GET      ((char *)"!")
      #define TOP_DEFAULT  ((char *)" ")
      #define TOP_IRING    ((char *)"I")
      #define TOP_DRING    ((char *)"D")
      #define TOP_SRING    ((char *)"S")
      #define TOP_HYPER    ((char *)"H")
      #define TOP_FULL     ((char *)"F")
      #define TOP_MRING    ((char *)"M")
      #define TOP_TTREE    ((char *)"T")
      #define TOP_TREE1    ((char *)"1")
      #define TOP_TREE2    ((char *)"2")
      #define TOP_TREE3    ((char *)"3")
      #define TOP_TREE4    ((char *)"4")
      #define TOP_TREE5    ((char *)"5")
      #define TOP_TREE6    ((char *)"6")
      #define TOP_TREE7    ((char *)"7")
      #define TOP_TREE8    ((char *)"8")
      #define TOP_TREE9    ((char *)"9")
      #endif

# PBLAS/SRC contains 123 precision-specific C entry points (pdgemm_.c,
# pzhemm_.c, pcsscal_.c, pdznrm2_.c, ...) plus one precision-independent
# Fortran file (pilaenv.f). All originals are retained so the resulting
# library still exposes the standard S/D/C/Z names.
copy_all_originals: true

# pilaenv.f is the only Fortran file in PBLAS/SRC/ — a precision-independent
# block-size query called by PB_Cplascal / PB_Cpsymm* / PB_Cptrmm* /
# PB_Cptrsm* etc. ``extensions: [.c, .h]`` above filters it out of the
# scan, but copy_files bypasses the extension filter so the file is staged
# verbatim (and because it's precision-independent, no rename is needed).
copy_files:
  - PILAENV

skip_files: []

# Hand-written replacements for the PB_C[dz]typeset typeset functions.
# The migrated-by-regex versions try to assign the macro ZERO (= 0.0)
# directly to a float64x2_t local, which the C type system rejects.
# These overrides use libmfc's struct constructors instead and refer
# to the migrated BLACS / BLAS / PBBLAS / PTZBLAS routine names by
# the renamed dd / zz prefixes.
overrides:
  multifloats:
    src_dir: pblas/mfc_overrides
    files:
      - pb_cddtypeset.c
      - pb_czztypeset.c
      # C++ bridge header providing type aliases and operators.
      # Copied to output_dir so -include pblas_mf_bridge.h resolves.
      - pblas_mf_bridge.h
      # Overlay header (fallback for pure-C compilation path).
      - pblas_mf_overlay.h
