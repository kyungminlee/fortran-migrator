name: Release Libraries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.2.0)'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── Stage migrated sources (one per target) ──────────────────────
  stage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [kind16, kind10, multifloats]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Extract external sources
        run: |
          cd external
          [ -d lapack-3.12.1 ] || tar xzf lapack-3.12.1.tar.gz
          [ -d scalapack-2.2.3 ] || tar xzf scalapack-2.2.3.tar.gz

      - name: Stage ${{ matrix.target }}
        run: |
          cd src
          uv run python -m pyengine stage \
            ${{ github.workspace }}/staging-${{ matrix.target }} \
            --target ${{ matrix.target }}

      - name: Convergence report
        run: |
          cd src
          RECIPES=(blas blacs lapack ptzblas pbblas pblas scalapack scalapack_c)
          {
            echo "## Convergence report: \`${{ matrix.target }}\`"
            echo ""
            for lib in "${RECIPES[@]}"; do
              RECIPE="../recipes/${lib}.yaml"
              OUTDIR="${{ github.workspace }}/staging-${{ matrix.target }}/${lib}/src"
              if [ ! -d "$OUTDIR" ]; then
                continue
              fi
              echo "### ${lib}"
              echo '```'
              uv run python -m pyengine converge "$RECIPE" "$OUTDIR" \
                --target ${{ matrix.target }} --context 4 2>&1 || true
              echo '```'
              echo ""
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload staged sources
        uses: actions/upload-artifact@v4
        with:
          name: staging-${{ matrix.target }}
          path: staging-${{ matrix.target }}/
          retention-days: 1

  # ── Build matrix: target x compiler ──────────────────────────────
  build:
    needs: stage
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [kind16, kind10, multifloats]
        compiler:
          - { name: gfortran-12,  fc: gfortran-12,   cc: gcc-12,    cxx: g++-12,      pkg: gcc-12 gfortran-12 }
          - { name: gfortran-15,  fc: gfortran-15,   cc: gcc-15,    cxx: g++-15,      pkg: gcc-15 gfortran-15 }
          - { name: ifx-2024,     fc: ifx,            cc: icx,       cxx: icpx,        pkg: "",  oneapi: "2024.2" }
          - { name: ifx-2025,     fc: ifx,            cc: icx,       cxx: icpx,        pkg: "",  oneapi: "2025.1" }
          - { name: flang-20,     fc: flang-new-20,   cc: clang-20,  cxx: clang++-20,  pkg: "" }
        exclude:
          # Only gfortran supports REAL(KIND=10) (80-bit x86 extended)
          - target: kind10
            compiler: { name: flang-20 }
          - target: kind10
            compiler: { name: ifx-2024 }
          - target: kind10
            compiler: { name: ifx-2025 }

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            cmake/

      - name: Download staged sources
        uses: actions/download-artifact@v4
        with:
          name: staging-${{ matrix.target }}
          path: staging/

      - name: Install GCC (gfortran)
        if: startsWith(matrix.compiler.name, 'gfortran')
        run: |
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.compiler.pkg }}

      - name: Install Intel oneAPI
        if: startsWith(matrix.compiler.name, 'ifx')
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          YEAR=$(echo "${{ matrix.compiler.oneapi }}" | cut -d. -f1)
          MINOR=$(echo "${{ matrix.compiler.oneapi }}" | cut -d. -f2)
          sudo apt-get install -y \
            intel-oneapi-compiler-fortran-${YEAR}.${MINOR} \
            intel-oneapi-compiler-dpcpp-cpp-${YEAR}.${MINOR} \
            intel-oneapi-mpi-devel-${YEAR}

      - name: Install LLVM Flang 20
        if: matrix.compiler.name == 'flang-20'
        run: |
          wget -O- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-20 main"
          sudo apt-get update
          sudo apt-get install -y flang-20 clang-20 libomp-20-dev

      - name: Install MPI
        if: "!startsWith(matrix.compiler.name, 'ifx')"
        run: sudo apt-get install -y libopenmpi-dev

      - name: Configure
        run: |
          if [ -n "${{ matrix.compiler.oneapi }}" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          cmake -S staging -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_Fortran_COMPILER=${{ matrix.compiler.fc }} \
            -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install

      - name: Build
        run: |
          if [ -n "${{ matrix.compiler.oneapi }}" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          cmake --build build -j$(nproc)

      - name: Install
        run: |
          if [ -n "${{ matrix.compiler.oneapi }}" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          cmake --install build

      - name: Package
        run: |
          cd install
          ARCHIVE="${{ matrix.target }}-${{ matrix.compiler.name }}-linux-x86_64"
          tar czf ${{ github.workspace }}/${ARCHIVE}.tar.gz .
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE }}
          path: ${{ env.ARCHIVE }}.tar.gz
          retention-days: 7

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: '*-linux-x86_64'

      - name: Collect tarballs
        run: |
          mkdir -p release
          find artifacts -name '*.tar.gz' -exec cp {} release/ \;
          ls -la release/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.tar.gz
          generate_release_notes: true
          body: |
            ## Extended-precision numerical libraries

            Pre-built static libraries for Linux x86-64.

            ### Targets
            | Target | Description | Prefix |
            |--------|-------------|--------|
            | `kind16` | 128-bit quad precision (`REAL(KIND=16)`) | Q/X |
            | `kind10` | 80-bit extended precision (`REAL(KIND=10)`) | E/Y |
            | `multifloats` | Double-double (`float64x2`) | DD/ZZ |

            ### Compilers
            | Compiler | Tag |
            |----------|-----|
            | GCC/gfortran 12 | `gfortran-12` |
            | GCC/gfortran 15 | `gfortran-15` |
            | Intel oneAPI 2024 (ifx) | `ifx-2024` |
            | Intel oneAPI 2025 (ifx) | `ifx-2025` |
            | LLVM Flang 20 | `flang-20` (kind16 and multifloats only) |

            ### Installation
            ```bash
            tar xzf kind16-gfortran-15-linux-x86_64.tar.gz -C /usr/local
            ```

            Libraries are compiler-tagged (e.g. `libqblas-gfortran-15.a`).
            Fortran modules are in `lib/fmod/<mod-tag>/`.
